services:
  - type: web
    name: manavsathi-render
    runtime: static
    buildCommand: npm ci && npm run build:web
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: EXPO_PUBLIC_TURSO_DATABASE_URL
        sync: false
      - key: EXPO_PUBLIC_TURSO_AUTH_TOKEN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
